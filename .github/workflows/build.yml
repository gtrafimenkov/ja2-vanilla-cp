name: Build

on:
  push:
    branches:
      - 'main'
      - 'dev'
  pull_request:

jobs:

  build-on-linux:

    runs-on: ubuntu-20.04

    steps:
    - uses: actions/checkout@v3

    - name: Build
      run: make build

    - name: Test
      run: make test

  build-on-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    - run: cmake -B build
    - run: cmake --build build --parallel
